# 部署版本入口 + v1.0.0 等子目录到 GitHub Pages
name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          set -e
          mkdir -p _pages
          cp index.html _pages/
          cp -r v1.0.0 _pages/
          touch _pages/.nojekyll
          cp index.html _pages/404.html
          test -f _pages/index.html
          test -f _pages/v1.0.0/index.html
          test -f _pages/v1.0.0/js/app.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
