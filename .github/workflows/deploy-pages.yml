# 部署根目录静态站点（index.html + css/ + js/）到 GitHub Pages
name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          set -e
          mkdir -p _pages
          cp index.html _pages/
          cp -r css js _pages/
          if [ -d annotation-docs ]; then cp -r annotation-docs _pages/; fi
          cp .nojekyll _pages/ 2>/dev/null || touch _pages/.nojekyll
          cp index.html _pages/404.html
          test -f _pages/index.html
          test -f _pages/js/app.js
          test -f _pages/js/annotation-spec-data.js
          test -f _pages/annotation-docs/01-首页与待跟进.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
