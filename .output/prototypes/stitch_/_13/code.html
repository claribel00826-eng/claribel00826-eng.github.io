<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#d5e3fd",
                    "surface-container-low": "#f6f3f5",
                    "inverse-surface": "#303032",
                    "tertiary": "#000000",
                    "on-primary": "#ffffff",
                    "secondary": "#515f74",
                    "on-tertiary-container": "#98805d",
                    "surface-container": "#f0edef",
                    "tertiary-container": "#271901",
                    "tertiary-fixed": "#fcdeb5",
                    "on-tertiary-fixed": "#271901",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#131b2e",
                    "on-secondary-container": "#57657b",
                    "surface-container-high": "#eae7e9",
                    "on-primary-fixed": "#131b2e",
                    "primary-fixed": "#dae2fd",
                    "outline-variant": "#c6c6cd",
                    "on-surface-variant": "#45464d",
                    "surface-variant": "#e4e2e4",
                    "on-secondary-fixed-variant": "#3a485c",
                    "surface-bright": "#fcf8fa",
                    "inverse-primary": "#bec6e0",
                    "primary": "#000000",
                    "on-secondary-fixed": "#0d1c2f",
                    "error-container": "#ffdad6",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-tertiary": "#ffffff",
                    "surface": "#fcf8fa",
                    "inverse-on-surface": "#f3f0f2",
                    "primary-fixed-dim": "#bec6e0",
                    "on-primary-container": "#7c839b",
                    "error": "#ba1a1a",
                    "outline": "#76777d",
                    "surface-dim": "#dcd9db",
                    "secondary-fixed": "#d5e3fd",
                    "on-surface": "#1b1b1d",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed-dim": "#dec29a",
                    "surface-tint": "#565e74",
                    "on-tertiary-fixed-variant": "#574425",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "on-background": "#1b1b1d",
                    "on-primary-fixed-variant": "#3f465c",
                    "background": "#fcf8fa",
                    "surface-container-highest": "#e4e2e4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "4px",
                    "stack-gap": "12px",
                    "inline-gap": "8px",
                    "container-padding": "16px",
                    "section-margin": "24px"
            },
            "fontFamily": {
                    "h2": ["PingFang SC"],
                    "label-caps": ["PingFang SC"],
                    "body-secondary": ["PingFang SC"],
                    "body-main": ["PingFang SC"],
                    "h1": ["PingFang SC"],
                    "number-data": ["Inter"],
                    "h3": ["PingFang SC"]
            },
            "fontSize": {
                    "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "number-data": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf8fa;
            color: #1b1b1d;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-main text-body-main">
<!-- Top Navigation Shell -->
<nav class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-inline-gap active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
<h1 class="font-h3 text-h3 text-primary">选择客户</h1>
</div>
<div class="flex items-center active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="more_vert">more_vert</span>
</div>
</nav>
<!-- Content Canvas -->
<main class="pt-[64px] pb-[100px] px-container-padding flex flex-col gap-stack-gap">
<!-- Search Section -->
<section class="mb-base">
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full bg-white border border-outline-variant rounded-lg py-3 pl-10 pr-4 focus:outline-none focus:border-secondary transition-colors font-body-secondary text-body-secondary" placeholder="搜索客户名称、联系人或标签" type="text"/>
</div>
</section>
<!-- Customer List Section -->
<div class="flex flex-col gap-3">
<p class="font-label-caps text-label-caps text-on-surface-variant px-1 uppercase">最近联系</p>
<!-- Customer Card 1 (Selected State) -->
<div class="bg-white border-2 border-primary rounded-xl p-container-padding flex items-center justify-between shadow-sm relative">
<div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-[3px] h-8 bg-primary rounded-full"></div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-primary-fixed rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="factory" data-weight="fill" style="font-variation-settings: 'FILL' 1;">factory</span>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-h3 text-h3 text-on-surface">江苏恒力重工集团</h2>
<div class="flex gap-2">
<span class="px-2 py-0.5 bg-secondary-container text-on-secondary-container text-[11px] rounded-full font-medium">制造业</span>
<span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[11px] rounded-full font-medium">VIP 客户</span>
</div>
</div>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Customer Card 2 -->
<div class="bg-white border border-outline-variant rounded-xl p-container-padding flex items-center justify-between active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="domain">domain</span>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-h3 text-h3 text-on-surface">上海精密机械有限公司</h2>
<div class="flex gap-2">
<span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[11px] rounded-full font-medium">高精密</span>
<span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[11px] rounded-full font-medium">待跟进</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
<!-- Customer Card 3 -->
<div class="bg-white border border-outline-variant rounded-xl p-container-padding flex items-center justify-between active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="precision_manufacturing">precision_manufacturing</span>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-h3 text-h3 text-on-surface">杭州自动化控制系统</h2>
<div class="flex gap-2">
<span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[11px] rounded-full font-medium">电子设备</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
<!-- Customer Card 4 -->
<div class="bg-white border border-outline-variant rounded-xl p-container-padding flex items-center justify-between active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="apartment">apartment</span>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-h3 text-h3 text-on-surface">中铁装备工程事业部</h2>
<div class="flex gap-2">
<span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[11px] rounded-full font-medium">国企</span>
<span class="px-2 py-0.5 bg-surface-container-high text-on-surface-variant text-[11px] rounded-full font-medium">长期合作伙伴</span>
</div>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</div>
</div>
<!-- Empty State Hint -->
<div class="mt-section-margin py-8 flex flex-col items-center justify-center opacity-40">
<span class="material-symbols-outlined text-[48px] mb-2" data-icon="person_search">person_search</span>
<p class="font-body-secondary text-body-secondary">没有找到匹配的客户？</p>
<button class="text-primary font-h3 mt-2">创建新客户</button>
</div>
</main>
<!-- Fixed Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-white px-container-padding py-4 border-t border-outline-variant z-50">
<div class="flex items-center justify-between gap-4">
<div class="flex flex-col">
<p class="font-label-caps text-label-caps text-on-surface-variant">已选择</p>
<p class="font-h3 text-h3 text-primary">江苏恒力重工集团</p>
</div>
<button class="bg-primary text-on-primary font-h3 px-10 py-3 rounded-lg active:scale-95 active:opacity-90 transition-all shadow-md">
                下一步
            </button>
</div>
<!-- Safe Area for Mobile Gesture -->
<div class="h-4"></div>
</footer>
</body></html>
