<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf8fa;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-main text-on-background">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="font-h3 text-h3 text-primary">智能销售助手</h1>
<div class="flex items-center active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary" data-icon="more_vert">more_vert</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[64px] pb-[100px] px-container-padding">
<!-- Form Section -->
<section class="mb-section-margin bg-white p-container-padding rounded-xl border border-outline-variant">
<div class="space-y-stack-gap">
<!-- Scheme Name Field -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant">方案名称</label>
<input class="w-full h-[48px] px-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-main text-on-surface focus:border-primary focus:ring-0 transition-colors" placeholder="华东精密_产线升级_初稿" type="text"/>
</div>
<!-- Notes Field -->
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant">备注</label>
<textarea class="w-full p-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-main text-on-surface focus:border-primary focus:ring-0 transition-colors resize-none" placeholder="含主机与夹具" rows="2"></textarea>
</div>
</div>
</section>
<!-- Product List Header -->
<div class="flex items-center justify-between mb-stack-gap">
<div class="flex items-center gap-base">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<h2 class="font-h3 text-h3 text-on-background">产品清单 (只读)</h2>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">共 3 件</span>
</div>
<!-- Read-only Product Grid (Bento Style) -->
<div class="grid grid-cols-1 gap-stack-gap">
<!-- Product Item 1 -->
<div class="bg-white border border-outline-variant rounded-xl overflow-hidden flex flex-row items-center p-3 gap-3">
<div class="w-20 h-20 rounded-lg bg-surface-container overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="A macro close-up of a precision industrial CNC machine component made of high-grade brushed steel. The lighting is cold and professional, highlighting the metallic texture and sharp edges. The background is a clean, blurred factory floor in a modern corporate light-mode style with soft gray tones. The mood is technical and high-end." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBicoA3Q3ER3ylk9lG2cJstv2209TwdMaf3os8VBgDfAuGgd3hrtxdVmueBPc5AnC9n5DKM02_aqK_qor9WAzJYynTvNXgAJTRqp1XMcihHdIoXLohWW8Ymx9dOq887o6VlX-gBaDB-QzZF7T7S5gP7RE3n_ZpcyelNR3pGxKaGefDEYNyNTlxnyDSPUOj6CMhbndacywD6J68wvvbHeXBFwWgf9xbIBhJdpIdFoMG0L0tGIv6uDhAX8xyGJN6nJl_Txe7TOcqniQ"/>
</div>
<div class="flex-grow">
<div class="font-h3 text-h3 text-on-background leading-tight">高精密五轴联动加工中心</div>
<div class="text-body-secondary text-on-surface-variant font-body-secondary mt-1">型号: AX-500 Pro</div>
<div class="flex justify-between items-end mt-2">
<span class="font-number-data text-number-data text-primary">¥ 1,280,000</span>
<span class="font-label-caps text-label-caps text-on-surface-variant px-2 py-0.5 bg-surface-container rounded-full">x1</span>
</div>
</div>
</div>
<!-- Product Item 2 -->
<div class="bg-white border border-outline-variant rounded-xl overflow-hidden flex flex-row items-center p-3 gap-3">
<div class="w-20 h-20 rounded-lg bg-surface-container overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="An industrial automation robotic arm gripper in a high-tech manufacturing environment. The scene is bright and minimalist with neutral gray and white surfaces. Strategic focus on the precision engineering of the clamp. The overall aesthetic is clean, corporate, and highly efficient, using a limited palette of steel and dark slate." src="https://lh3.googleusercontent.com/aida-public/AB6AXuALuYk41kpcDJbpXcaMqRLuX1DR8zSQuGaedYZHNpkGTaCmvG_UKnFE3LgkLT1iuepQNk5uzCGrWvDNZi2CzY145J3RcM0-Op9pMSSp9ArkzrfCKGs9Yrx1vMBLnMqm1DkxEvDKXfGydak0nBdXJL7g7DimPopd-Tih5nwaVUPMHoCM-b-hRPOm1zR3UG76cbQr21TSVSp7L7_40XWFr2SL68hBGkeBWl_2-ChEhyZg3tvs64yKSyIlAzXj59KxBALRHWKbhlJ_Fg"/>
</div>
<div class="flex-grow">
<div class="font-h3 text-h3 text-on-background leading-tight">液压自动对心夹具</div>
<div class="text-body-secondary text-on-surface-variant font-body-secondary mt-1">型号: HYD-75C</div>
<div class="flex justify-between items-end mt-2">
<span class="font-number-data text-number-data text-primary">¥ 45,600</span>
<span class="font-label-caps text-label-caps text-on-surface-variant px-2 py-0.5 bg-surface-container rounded-full">x2</span>
</div>
</div>
</div>
<!-- Total Price Summary Card -->
<div class="mt-base bg-primary-container p-container-padding rounded-xl flex justify-between items-center">
<span class="font-body-main text-on-primary-container">方案预计总值</span>
<span class="font-h2 text-h2 text-on-primary-container">¥ 1,371,200</span>
</div>
</div>
</main>
<!-- Bottom Actions Container -->
<footer class="fixed bottom-0 left-0 w-full bg-white border-t border-outline-variant px-container-padding py-4 z-50 flex flex-col gap-3 pb-[calc(1rem+env(safe-area-inset-bottom))]">
<button class="w-full h-[52px] bg-primary text-white rounded-[10px] font-h3 text-h3 flex items-center justify-center active:opacity-90 transition-opacity">
            保存方案
        </button>
<button class="w-full h-[52px] bg-transparent text-secondary border border-outline-variant rounded-[10px] font-h3 text-h3 flex items-center justify-center active:bg-surface-container-low transition-colors">
            返回修改购物车
        </button>
</footer>
</body></html>
