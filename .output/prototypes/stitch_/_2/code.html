<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e4e2e4",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#574425",
                    "tertiary": "#000000",
                    "primary-fixed": "#dae2fd",
                    "on-primary-fixed-variant": "#3f465c",
                    "inverse-primary": "#bec6e0",
                    "secondary": "#515f74",
                    "secondary-container": "#d5e3fd",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#3a485c",
                    "surface-container-low": "#f6f3f5",
                    "on-secondary-fixed": "#0d1c2f",
                    "on-tertiary-container": "#98805d",
                    "on-surface-variant": "#45464d",
                    "surface": "#fcf8fa",
                    "surface-tint": "#565e74",
                    "tertiary-fixed-dim": "#dec29a",
                    "on-tertiary-fixed": "#271901",
                    "on-secondary-container": "#57657b",
                    "error-container": "#ffdad6",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#131b2e",
                    "secondary-fixed": "#d5e3fd",
                    "tertiary-fixed": "#fcdeb5",
                    "surface-container-highest": "#e4e2e4",
                    "on-background": "#1b1b1d",
                    "inverse-surface": "#303032",
                    "primary-fixed-dim": "#bec6e0",
                    "primary": "#000000",
                    "outline-variant": "#c6c6cd",
                    "on-surface": "#1b1b1d",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#76777d",
                    "surface-container-high": "#eae7e9",
                    "background": "#fcf8fa",
                    "surface-dim": "#dcd9db",
                    "inverse-on-surface": "#f3f0f2",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-margin": "24px",
                    "base": "4px",
                    "inline-gap": "8px",
                    "stack-gap": "12px",
                    "container-padding": "16px"
            },
            "fontFamily": {
                    "h3": ["PingFang SC"],
                    "h1": ["PingFang SC"],
                    "body-main": ["PingFang SC"],
                    "h2": ["PingFang SC"],
                    "body-secondary": ["PingFang SC"],
                    "label-caps": ["PingFang SC"],
                    "number-data": ["Inter"]
            },
            "fontSize": {
                    "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "number-data": ["18px", {"lineHeight": "24px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'PingFang SC', sans-serif; background-color: #fcf8fa; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .industrial-pattern {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center overflow-hidden">
<!-- Top Navigation Shell (Injected Styles from JSON) -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-base active:scale-95 transition-transform duration-150 active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="precision_manufacturing">precision_manufacturing</span>
<h1 class="font-h3 text-h3 text-primary dark:text-inverse-primary">智能销售助手</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface-variant dark:text-surface-variant active:opacity-80 transition-opacity" data-icon="more_vert">more_vert</span>
</div>
</header>
<!-- Error Toast Notification -->
<div class="fixed top-[64px] left-container-padding right-container-padding z-40">
<div class="flex items-center gap-inline-gap bg-error-container text-on-error-container px-4 py-3 rounded-lg border border-error/20 shadow-sm">
<span class="material-symbols-outlined text-[20px]" data-icon="error">error</span>
<span class="font-body-secondary text-body-secondary">登录已过期，请重新登录。</span>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow w-full max-w-[480px] flex flex-col items-center justify-center px-container-padding pt-[48px]">
<!-- Brand Area Section -->
<section class="w-full text-center mb-12">
<div class="relative inline-block mb-8">
<!-- Industrial Logo Placeholder -->
<div class="w-20 h-20 bg-primary rounded-xl flex items-center justify-center shadow-lg transform rotate-3">
<span class="material-symbols-outlined text-white text-[48px]" data-icon="factory" data-weight="fill" style="font-variation-settings: 'FILL' 1;">factory</span>
</div>
<div class="absolute -bottom-2 -right-2 w-10 h-10 bg-secondary-container rounded-lg flex items-center justify-center shadow-md transform -rotate-6">
<span class="material-symbols-outlined text-on-secondary-container text-[24px]" data-icon="settings_suggest">settings_suggest</span>
</div>
</div>
<h2 class="font-h1 text-h1 text-primary mb-4">智能销售助手</h2>
<p class="font-body-main text-on-surface-variant max-w-[280px] mx-auto">
                使用现有制造云平台账号，无需单独注册。
            </p>
</section>
<!-- Authentication Card Section (Bento Style) -->
<section class="w-full space-y-stack-gap">
<div class="bg-surface-container-lowest border border-outline-variant p-1 rounded-xl">
<button class="w-full bg-primary text-on-primary font-h3 text-h3 py-4 rounded-lg flex items-center justify-center gap-inline-gap active:scale-[0.98] transition-transform duration-150 shadow-md">
<span class="material-symbols-outlined" data-icon="domain">domain</span>
                    使用企业账号登录
                </button>
</div>
<!-- Contextual Info Cards -->
<div class="grid grid-cols-2 gap-stack-gap opacity-60">
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant flex flex-col gap-base">
<span class="material-symbols-outlined text-secondary" data-icon="shield_lock">shield_lock</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">加密传输</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant flex flex-col gap-base">
<span class="material-symbols-outlined text-secondary" data-icon="verified_user">verified_user</span>
<span class="font-label-caps text-label-caps text-on-surface-variant">认证接入</span>
</div>
</div>
</section>
</main>
<!-- Footer Action Area -->
<footer class="w-full py-8 px-container-padding flex flex-col items-center gap-base bg-surface-container-lowest">
<div class="flex items-center gap-inline-gap">
<a class="font-body-secondary text-on-surface-variant hover:text-primary underline decoration-outline-variant underline-offset-4" href="#">用户协议</a>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<a class="font-body-secondary text-on-surface-variant hover:text-primary underline decoration-outline-variant underline-offset-4" href="#">隐私政策</a>
</div>
<p class="font-label-caps text-label-caps text-outline mt-2">© 2024 制造云工业软件有限公司</p>
</footer>
<!-- Background Decoration for Industrial Aesthetic -->
<div class="fixed inset-0 industrial-pattern opacity-[0.03] -z-10 pointer-events-none"></div>
<div class="fixed top-0 right-0 w-64 h-64 bg-primary/5 blur-[120px] -z-10 pointer-events-none rounded-full"></div>
</body></html>
