<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#dec29a",
                    "tertiary-fixed": "#fcdeb5",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e4e2e4",
                    "secondary": "#515f74",
                    "on-surface-variant": "#45464d",
                    "on-background": "#1b1b1d",
                    "tertiary": "#000000",
                    "surface-container-lowest": "#ffffff",
                    "on-surface": "#1b1b1d",
                    "primary": "#000000",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "tertiary-container": "#271901",
                    "on-tertiary-container": "#98805d",
                    "inverse-primary": "#bec6e0",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-secondary-container": "#57657b",
                    "on-tertiary-fixed-variant": "#574425",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#3f465c",
                    "surface": "#fcf8fa",
                    "on-tertiary-fixed": "#271901",
                    "surface-variant": "#e4e2e4",
                    "surface-tint": "#565e74",
                    "surface-container-low": "#f6f3f5",
                    "inverse-surface": "#303032",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "surface-container": "#f0edef",
                    "outline": "#76777d",
                    "primary-fixed": "#dae2fd",
                    "on-error-container": "#93000a",
                    "surface-bright": "#fcf8fa",
                    "surface-container-high": "#eae7e9",
                    "primary-fixed-dim": "#bec6e0",
                    "on-primary-fixed": "#131b2e",
                    "on-secondary-fixed-variant": "#3a485c",
                    "on-secondary-fixed": "#0d1c2f",
                    "background": "#fcf8fa",
                    "on-primary-container": "#7c839b",
                    "outline-variant": "#c6c6cd",
                    "secondary-fixed": "#d5e3fd",
                    "primary-container": "#131b2e",
                    "surface-dim": "#dcd9db",
                    "secondary-container": "#d5e3fd",
                    "inverse-on-surface": "#f3f0f2"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-gap": "12px",
                    "inline-gap": "8px",
                    "section-margin": "24px",
                    "base": "4px",
                    "container-padding": "16px"
            },
            "fontFamily": {
                    "number-data": ["Inter"],
                    "h3": ["PingFang SC"],
                    "body-main": ["PingFang SC"],
                    "h2": ["PingFang SC"],
                    "h1": ["PingFang SC"],
                    "body-secondary": ["PingFang SC"],
                    "label-caps": ["PingFang SC"]
            },
            "fontSize": {
                    "number-data": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf8fa;
            color: #1b1b1d;
            -webkit-tap-highlight-color: transparent;
        }
        .order-table-row:nth-child(even) {
            background-color: #f6f3f5;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-inline-gap active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary">arrow_back</span>
<h1 class="font-h3 text-h3 text-primary dark:text-inverse-primary">智能销售助手</h1>
</div>
<span class="material-symbols-outlined text-on-surface-variant dark:text-surface-variant active:opacity-80 transition-opacity">more_vert</span>
</header>
<main class="flex-grow pt-[48px] pb-32">
<!-- Amber Warning Banner -->
<div class="bg-tertiary-fixed p-container-padding flex flex-col gap-3">
<div class="flex items-start gap-2">
<span class="material-symbols-outlined text-on-tertiary-fixed text-[20px]">warning</span>
<p class="font-body-secondary text-body-secondary text-on-tertiary-fixed leading-tight">
                    该方案未进行交期评审，直接下单存在交付风险。
                </p>
</div>
<div class="flex justify-end gap-inline-gap">
<button class="px-4 py-1.5 rounded-lg border border-on-tertiary-fixed-variant text-on-tertiary-fixed-variant font-label-caps text-label-caps active:scale-95 transition-transform">
                    继续
                </button>
<button class="px-4 py-1.5 rounded-lg bg-tertiary-container text-on-tertiary font-label-caps text-label-caps active:scale-95 transition-transform">
                    去评审
                </button>
</div>
</div>
<!-- Order Content Section -->
<div class="px-container-padding mt-section-margin">
<div class="flex items-center justify-between mb-stack-gap">
<h2 class="font-h2 text-h2 border-l-4 border-primary pl-2">订单确认</h2>
<span class="font-body-secondary text-body-secondary text-on-surface-variant">订单号: SO2023102701</span>
</div>
<!-- Bento-style Product List -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant overflow-hidden">
<div class="grid grid-cols-12 gap-0 border-b border-outline-variant bg-surface-container text-on-surface-variant font-label-caps text-label-caps p-3">
<div class="col-span-6">产品信息</div>
<div class="col-span-3 text-right">单价</div>
<div class="col-span-3 text-right">数量</div>
</div>
<!-- Product Rows -->
<div class="divide-y divide-outline-variant">
<!-- Item 1 -->
<div class="grid grid-cols-12 items-center p-3 order-table-row">
<div class="col-span-6 flex flex-col">
<span class="font-h3 text-h3">高精度伺服电机</span>
<span class="font-body-secondary text-body-secondary text-on-surface-variant">型号: XM-200S / 工业级</span>
</div>
<div class="col-span-3 text-right">
<span class="font-number-data text-number-data text-primary">¥4,200</span>
</div>
<div class="col-span-3 flex justify-end">
<div class="flex items-center border border-outline rounded-lg overflow-hidden bg-surface-container-low">
<button class="w-8 h-8 flex items-center justify-center border-r border-outline active:bg-outline-variant">
<span class="material-symbols-outlined text-[16px]">remove</span>
</button>
<input class="w-10 h-8 border-none bg-transparent text-center font-number-data text-[14px] p-0 focus:ring-0" type="number" value="12"/>
<button class="w-8 h-8 flex items-center justify-center border-l border-outline active:bg-outline-variant">
<span class="material-symbols-outlined text-[16px]">add</span>
</button>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="grid grid-cols-12 items-center p-3 order-table-row">
<div class="col-span-6 flex flex-col">
<span class="font-h3 text-h3">智能控制模块</span>
<span class="font-body-secondary text-body-secondary text-on-surface-variant">型号: IC-90-Pro / 兼容系列</span>
</div>
<div class="col-span-3 text-right">
<span class="font-number-data text-number-data text-primary">¥1,850</span>
</div>
<div class="col-span-3 flex justify-end">
<div class="flex items-center border border-outline rounded-lg overflow-hidden bg-surface-container-low">
<button class="w-8 h-8 flex items-center justify-center border-r border-outline active:bg-outline-variant">
<span class="material-symbols-outlined text-[16px]">remove</span>
</button>
<input class="w-10 h-8 border-none bg-transparent text-center font-number-data text-[14px] p-0 focus:ring-0" type="number" value="5"/>
<button class="w-8 h-8 flex items-center justify-center border-l border-outline active:bg-outline-variant">
<span class="material-symbols-outlined text-[16px]">add</span>
</button>
</div>
</div>
</div>
<!-- Item 3 -->
<div class="grid grid-cols-12 items-center p-3 order-table-row">
<div class="col-span-6 flex flex-col">
<span class="font-h3 text-h3">工业传输组件</span>
<span class="font-body-secondary text-body-secondary text-on-surface-variant">型号: CT-800B / 不锈钢</span>
</div>
<div class="col-span-3 text-right">
<span class="font-number-data text-number-data text-primary">¥920</span>
</div>
<div class="col-span-3 flex justify-end">
<div class="flex items-center border border-outline rounded-lg overflow-hidden bg-surface-container-low">
<button class="w-8 h-8 flex items-center justify-center border-r border-outline active:bg-outline-variant">
<span class="material-symbols-outlined text-[16px]">remove</span>
</button>
<input class="w-10 h-8 border-none bg-transparent text-center font-number-data text-[14px] p-0 focus:ring-0" type="number" value="20"/>
<button class="w-8 h-8 flex items-center justify-center border-l border-outline active:bg-outline-variant">
<span class="material-symbols-outlined text-[16px]">add</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Total Price Card -->
<div class="mt-section-margin bg-primary-container p-container-padding rounded-xl flex items-center justify-between">
<div class="flex flex-col">
<span class="text-on-primary-container font-label-caps text-label-caps">订单预计总额</span>
<span class="font-number-data text-[24px] text-on-primary">¥78,050.00</span>
</div>
<div class="text-on-primary-container opacity-60">
<span class="material-symbols-outlined text-[32px]">payments</span>
</div>
</div>
<!-- Customer Details Summary -->
<div class="mt-stack-gap bg-surface-container-high p-4 rounded-xl flex flex-col gap-2">
<div class="flex justify-between">
<span class="text-on-surface-variant font-body-secondary">客户名称:</span>
<span class="text-on-surface font-body-main">上海拓远工业机械有限公司</span>
</div>
<div class="flex justify-between">
<span class="text-on-surface-variant font-body-secondary">交付方式:</span>
<span class="text-on-surface font-body-main">物流配送 (送货上门)</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar (Fixed) -->
<footer class="fixed bottom-0 left-0 w-full bg-surface p-container-padding border-t border-outline-variant pb-8 z-50">
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between mb-1">
<span class="font-body-secondary text-body-secondary text-on-surface-variant">共计 3 类产品, 37 件</span>
<span class="font-body-main text-body-main text-error">含税费: ¥5,463.50</span>
</div>
<button class="w-full h-[48px] bg-primary text-on-primary font-h3 text-h3 rounded-lg flex items-center justify-center gap-inline-gap active:opacity-90 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">check_circle</span>
                确认下单
            </button>
</div>
</footer>
</body></html>
