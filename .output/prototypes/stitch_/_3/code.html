<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=PingFang+SC:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e4e2e4",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#574425",
                    "tertiary": "#000000",
                    "primary-fixed": "#dae2fd",
                    "on-primary-fixed-variant": "#3f465c",
                    "inverse-primary": "#bec6e0",
                    "secondary": "#515f74",
                    "secondary-container": "#d5e3fd",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#3a485c",
                    "surface-container-low": "#f6f3f5",
                    "on-secondary-fixed": "#0d1c2f",
                    "on-tertiary-container": "#98805d",
                    "on-surface-variant": "#45464d",
                    "surface": "#fcf8fa",
                    "surface-tint": "#565e74",
                    "tertiary-fixed-dim": "#dec29a",
                    "on-tertiary-fixed": "#271901",
                    "on-secondary-container": "#57657b",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "surface-container": "#f0edef",
                    "surface-bright": "#fcf8fa",
                    "primary-container": "#131b2e",
                    "on-primary-container": "#7c839b",
                    "tertiary-container": "#271901",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#131b2e",
                    "secondary-fixed": "#d5e3fd",
                    "tertiary-fixed": "#fcdeb5",
                    "surface-container-highest": "#e4e2e4",
                    "on-background": "#1b1b1d",
                    "inverse-surface": "#303032",
                    "primary-fixed-dim": "#bec6e0",
                    "primary": "#000000",
                    "outline-variant": "#c6c6cd",
                    "on-surface": "#1b1b1d",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#76777d",
                    "surface-container-high": "#eae7e9",
                    "background": "#fcf8fa",
                    "surface-dim": "#dcd9db",
                    "inverse-on-surface": "#f3f0f2",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-margin": "24px",
                    "base": "4px",
                    "inline-gap": "8px",
                    "stack-gap": "12px",
                    "container-padding": "16px"
            },
            "fontFamily": {
                    "h3": ["PingFang SC"],
                    "h1": ["PingFang SC"],
                    "body-main": ["PingFang SC"],
                    "h2": ["PingFang SC"],
                    "body-secondary": ["PingFang SC"],
                    "label-caps": ["PingFang SC"],
                    "number-data": ["Inter"]
            },
            "fontSize": {
                    "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "number-data": ["18px", {"lineHeight": "24px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #fcf8fa;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center">
<button class="active:scale-95 transition-transform duration-150 active:opacity-80 flex items-center justify-center w-8 h-8 -ml-2">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-h3 text-h3 text-primary ml-1">写跟进</h1>
</div>
<div class="flex items-center">
<button class="active:scale-95 transition-transform duration-150 active:opacity-80 flex items-center justify-center w-8 h-8">
<span class="material-symbols-outlined text-on-surface" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-[48px] pb-[200px]">
<!-- Customer Banner -->
<section class="bg-surface-container-lowest px-container-padding py-stack-gap flex items-center justify-between border-b border-outline-variant">
<div class="flex items-center gap-inline-gap">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container" data-icon="corporate_fare" data-weight="fill" style="font-variation-settings: 'FILL' 1;">corporate_fare</span>
</div>
<div class="flex flex-col">
<div class="flex items-center gap-2">
<span class="font-h3 text-h3 text-on-surface">华东精密</span>
<span class="px-1.5 py-0.5 rounded bg-secondary-container text-on-secondary-container font-label-caps text-[10px]">老客户</span>
</div>
<span class="font-body-secondary text-body-secondary text-on-surface-variant">智能制造事业部</span>
</div>
</div>
<button class="flex items-center gap-1 px-3 py-1.5 rounded-lg border border-outline-variant active:bg-surface-container-low transition-colors">
<span class="font-body-secondary text-body-secondary text-primary">切换</span>
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="swap_horiz">swap_horiz</span>
</button>
</section>
<!-- Input Area -->
<section class="mt-section-margin px-container-padding">
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-container-padding overflow-hidden">
<div class="flex items-center justify-between mb-stack-gap">
<div class="flex items-center gap-1">
<div class="w-1 h-4 bg-primary rounded-full"></div>
<label class="font-h3 text-h3 text-on-surface">跟进备注</label>
</div>
<span class="font-label-caps text-on-surface-variant">19/500</span>
</div>
<textarea class="w-full h-40 bg-transparent border-none focus:ring-0 font-body-main text-on-surface placeholder-outline resize-none p-0" placeholder="请输入跟进详情...">已电话沟通，客户关心交期，下周约现场。</textarea>
<!-- Tools -->
<div class="flex items-center justify-between mt-stack-gap pt-stack-gap border-t border-outline-variant">
<div class="flex gap-4">
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="mic">mic</span>
</button>
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="image">image</span>
</button>
<button class="active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="alternate_email">alternate_email</span>
</button>
</div>
<button class="flex items-center gap-1 text-secondary">
<span class="font-label-caps">更多选项</span>
<span class="material-symbols-outlined text-[16px]" data-icon="expand_more">expand_more</span>
</button>
</div>
</div>
</section>
<!-- Additional Info (Bento Style) -->
<section class="mt-section-margin px-container-padding grid grid-cols-2 gap-stack-gap">
<div class="bg-surface-container-low p-container-padding rounded-xl flex flex-col gap-1 active:bg-surface-container-high transition-colors">
<span class="font-label-caps text-on-surface-variant">跟进方式</span>
<div class="flex items-center justify-between">
<span class="font-h3 text-on-surface">电话沟通</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<div class="bg-surface-container-low p-container-padding rounded-xl flex flex-col gap-1 active:bg-surface-container-high transition-colors">
<span class="font-label-caps text-on-surface-variant">跟进状态</span>
<div class="flex items-center justify-between">
<span class="font-h3 text-on-surface">推进中</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar (Voice Mode) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest rounded-t-[24px] shadow-[0_-4px_12px_rgba(15,23,42,0.08)] px-container-padding pt-6 pb-8 z-50">
<div class="flex flex-col items-center">
<p class="font-body-secondary text-on-surface-variant mb-6">按住说话，智能识别跟进要点</p>
<div class="flex items-center justify-between w-full">
<!-- Text Switch -->
<button class="flex flex-col items-center gap-1 active:opacity-60 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="keyboard">keyboard</span>
</div>
<span class="font-label-caps text-on-surface-variant">切文字</span>
</button>
<!-- Giant Mic Button -->
<div class="relative">
<div class="absolute -inset-4 bg-primary/5 rounded-full blur-xl"></div>
<button class="relative w-20 h-20 bg-primary rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-all duration-200">
<span class="material-symbols-outlined text-white text-[40px]" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Template Link -->
<button class="flex flex-col items-center gap-1 active:opacity-60 transition-opacity">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="description">description</span>
</div>
<span class="font-label-caps text-on-surface-variant">模版</span>
</button>
</div>
<!-- Submit Helper -->
<button class="mt-8 w-full py-3 bg-primary text-on-primary font-h3 rounded-xl active:opacity-90 transition-opacity">
                提交跟进
            </button>
</div>
</div>
</body></html>
