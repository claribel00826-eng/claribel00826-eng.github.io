            "fontFamily": {

<style>
        body {
            background-color: #fcf8fa;
            color: #1b1b1d;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .spec-row:nth-child(even) {
            background-color: #f6f3f5;
        }
        .industrial-shadow {
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-main text-body-main">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-2 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
<span class="font-h3 text-h3 text-primary">智能销售助手</span>
</div>
<div class="active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="pt-[48px] pb-[100px] px-container-padding flex flex-col gap-stack-gap">
<!-- Page Title & Selector -->
<section class="mt-section-margin">
<h1 class="font-h1 text-h1 text-on-surface mb-2">生成报价单</h1>
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 flex items-center justify-between active:bg-surface-variant transition-colors">
<div class="flex flex-col">
<span class="text-label-caps font-label-caps text-on-surface-variant mb-1">当前选择方案</span>
<span class="font-h3 text-h3 text-primary">方案：华东精密_产线升级_初稿</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="unfold_more">unfold_more</span>
</div>
</section>
<!-- Quote Preview Card -->
<section class="flex flex-col gap-4">
<div class="bg-white border border-outline-variant rounded-xl overflow-hidden industrial-shadow">
<div class="px-4 py-3 border-b border-outline-variant flex items-center">
<div class="w-[3px] h-4 bg-primary mr-3"></div>
<span class="font-h3 text-h3 text-primary">报价明细预览</span>
</div>
<div class="p-0">
<!-- Spec Sheet Style Table -->
<div class="flex flex-col">
<div class="spec-row flex justify-between items-center px-4 py-4">
<span class="text-on-surface-variant font-body-secondary">设备小计</span>
<span class="font-number-data text-number-data text-primary">¥1,020,000</span>
</div>
<!-- Editable Row: Discount -->
<div class="spec-row flex justify-between items-center px-4 py-4">
<span class="text-on-surface-variant font-body-secondary">折扣 (%)</span>
<div class="flex items-center gap-2">
<div class="relative w-24">
<input class="w-full text-right bg-surface-container-lowest border border-on-secondary-container rounded-lg px-3 py-1 text-primary focus:border-primary focus:ring-0 font-number-data text-body-main" type="text" value="-3%"/>
</div>
<span class="font-number-data text-body-main text-error">-¥30,600</span>
</div>
</div>
<!-- Editable Row: Shipping -->
<div class="spec-row flex justify-between items-center px-4 py-4">
<span class="text-on-surface-variant font-body-secondary">运费估算 (¥)</span>
<div class="relative w-32">
<input class="w-full text-right bg-surface-container-lowest border border-on-secondary-container rounded-lg px-3 py-1 text-primary focus:border-primary focus:ring-0 font-number-data text-body-main" type="text" value="8,000"/>
</div>
</div>
<!-- Summary Row -->
<div class="bg-primary-container text-on-primary-container flex justify-between items-center px-4 py-6">
<span class="font-h3 text-h3">总计费用</span>
<div class="text-right">
<span class="font-h2 text-h2 block text-white">¥997,400</span>
<span class="text-label-caps font-label-caps opacity-70">含税(13%)及各项费用</span>
</div>
</div>
</div>
</div>
</div>
<!-- Additional Options -->
<div class="bg-surface-container-low rounded-xl p-4 flex items-center justify-between border border-outline-variant">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" data-icon="description">description</span>
<span class="text-body-main font-body-main">报价单有效期至 2023-12-31</span>
</div>
<span class="material-symbols-outlined text-outline" data-icon="edit">edit</span>
</div>
</section>
<!-- Illustration / Background element -->
<div class="mt-4 opacity-40">
<img alt="Modern Industrial Scene" class="w-full h-32 object-cover rounded-xl border border-outline-variant" data-alt="A clean, high-tech industrial manufacturing facility with robotic arms and precise assembly lines in a brightly lit environment. The scene is shot with a professional architectural photography style, emphasizing geometric lines and a cool, corporate color palette of slate grays, deep blues, and crisp whites. The lighting is even and soft, reflecting a modern, high-end light-mode aesthetic that conveys efficiency and industrial excellence." src="https://lh3.googleusercontent.com/aida-public/AB6AXuClORJ3gjaOfqLOJIHEA8bWNqDGhueckXTyTQmDcNmmGzPyjnJzdWrXdeM5OtREXijOoEkXY56dHxqYz51zqe5PiLKYdQmmo1PTYw3Lx_7LQJX7LgvtOdd4evat3Z7OGhQmJzi5ByCvw3OqLGpCEXCCmTTA3z2aAgBc_fOvjywZH2_XrPNUtbCFambrz_MPFQPiwUU9R4SRz-K8uswKIdDTbzt4-xOhbLca9_AvUcg8HpEnMD155XIFjlDrYje8rlh4v4VpI-CTwg"/>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-container-padding flex flex-col gap-4 z-50">
<button class="w-full bg-primary text-on-primary font-h3 text-h3 py-4 rounded-xl shadow-lg active:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="picture_as_pdf">picture_as_pdf</span>
            确认生成报价单
        </button>
<div class="h-1 w-32 bg-outline-variant rounded-full mx-auto opacity-30"></div>
</footer>
</body></html>
