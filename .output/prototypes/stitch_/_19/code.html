<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=PingFang+SC:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#d5e3fd",
                        "surface-container-low": "#f6f3f5",
                        "inverse-surface": "#303032",
                        "tertiary": "#000000",
                        "on-primary": "#ffffff",
                        "secondary": "#515f74",
                        "on-tertiary-container": "#98805d",
                        "surface-container": "#f0edef",
                        "tertiary-container": "#271901",
                        "tertiary-fixed": "#fcdeb5",
                        "on-tertiary-fixed": "#271901",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#131b2e",
                        "on-secondary-container": "#57657b",
                        "surface-container-high": "#eae7e9",
                        "on-primary-fixed": "#131b2e",
                        "primary-fixed": "#dae2fd",
                        "outline-variant": "#c6c6cd",
                        "on-surface-variant": "#45464d",
                        "surface-variant": "#e4e2e4",
                        "on-secondary-fixed-variant": "#3a485c",
                        "surface-bright": "#fcf8fa",
                        "inverse-primary": "#bec6e0",
                        "primary": "#000000",
                        "on-secondary-fixed": "#0d1c2f",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b9c7e0",
                        "on-tertiary": "#ffffff",
                        "surface": "#fcf8fa",
                        "inverse-on-surface": "#f3f0f2",
                        "primary-fixed-dim": "#bec6e0",
                        "on-primary-container": "#7c839b",
                        "error": "#ba1a1a",
                        "outline": "#76777d",
                        "surface-dim": "#dcd9db",
                        "secondary-fixed": "#d5e3fd",
                        "on-surface": "#1b1b1d",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#dec29a",
                        "surface-tint": "#565e74",
                        "on-tertiary-fixed-variant": "#574425",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-background": "#1b1b1d",
                        "on-primary-fixed-variant": "#3f465c",
                        "background": "#fcf8fa",
                        "surface-container-highest": "#e4e2e4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "stack-gap": "12px",
                        "inline-gap": "8px",
                        "container-padding": "16px",
                        "section-margin": "24px"
                    },
                    "fontFamily": {
                        "h2": ["PingFang SC"],
                        "label-caps": ["PingFang SC"],
                        "body-secondary": ["PingFang SC"],
                        "body-main": ["PingFang SC"],
                        "h1": ["PingFang SC"],
                        "number-data": ["Inter"],
                        "h3": ["PingFang SC"]
                    },
                    "fontSize": {
                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "number-data": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'PingFang SC', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .glass-header { backdrop-filter: blur(8px); background: rgba(252, 248, 250, 0.85); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-inline-gap">
<span class="material-symbols-outlined text-primary active:scale-95 transition-transform">arrow_back</span>
<h1 class="font-h3 text-h3 text-primary">订单变更</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-primary active:scale-95 transition-transform">more_vert</span>
</div>
</header>
<main class="pt-[48px] pb-32 px-container-padding">
<!-- Order Context Section (Bento Style) -->
<section class="mt-section-margin">
<div class="flex items-center gap-2 mb-stack-gap">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<h2 class="font-h2 text-h2">待变更订单详情</h2>
</div>
<div class="grid grid-cols-1 gap-stack-gap">
<!-- Primary Order Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-container-padding shadow-sm">
<div class="flex justify-between items-start mb-3">
<div>
<p class="font-label-caps text-on-surface-variant mb-1">订单编号</p>
<p class="font-number-data text-primary">ORD-20240522-0941</p>
</div>
<span class="px-2 py-1 bg-secondary-container text-on-secondary-fixed-variant rounded text-[12px] font-medium">生产中</span>
</div>
<div class="space-y-3 pt-3 border-t border-outline-variant/30">
<div class="flex justify-between items-center">
<span class="text-body-secondary text-on-surface-variant">产品名称</span>
<span class="text-body-main font-medium">精密减速器 X-102 型号</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-secondary text-on-surface-variant">下单数量</span>
<span class="text-body-main font-number-data">1,200 PCS</span>
</div>
<div class="flex justify-between items-center">
<span class="text-body-secondary text-on-surface-variant">计划交期</span>
<span class="text-body-main font-number-data">2024-06-15</span>
</div>
</div>
</div>
</div>
</section>
<!-- Exception Reason Selection (Professional Form) -->
<section class="mt-section-margin">
<div class="flex items-center gap-2 mb-stack-gap">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<h2 class="font-h2 text-h2">异常原因反馈</h2>
</div>
<div class="space-y-3">
<!-- Radio Option 1 -->
<label class="flex items-center p-4 bg-surface-container-lowest border border-outline-variant rounded-xl active:bg-secondary-container/20 transition-colors">
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="reason" type="radio"/>
<span class="ml-3 text-body-main">客户要求取消</span>
</label>
<!-- Radio Option 2 -->
<label class="flex items-center p-4 bg-surface-container-lowest border border-outline-variant rounded-xl active:bg-secondary-container/20 transition-colors">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="reason" type="radio"/>
<span class="ml-3 text-body-main">物料问题无法生产</span>
</label>
<!-- Radio Option 3 -->
<label class="flex items-center p-4 bg-surface-container-lowest border border-outline-variant rounded-xl active:bg-secondary-container/20 transition-colors">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="reason" type="radio"/>
<span class="ml-3 text-body-main">交期无法满足</span>
</label>
</div>
</section>
<!-- Remarks Section with Voice Interaction -->
<section class="mt-section-margin">
<div class="flex items-center justify-between mb-stack-gap">
<div class="flex items-center gap-2">
<div class="w-1 h-5 bg-primary rounded-full"></div>
<h2 class="font-h2 text-h2">补充说明</h2>
</div>
<span class="text-[12px] text-on-surface-variant">（选填）</span>
</div>
<div class="relative bg-surface-container-lowest border border-outline-variant rounded-xl p-4">
<textarea class="w-full h-32 bg-transparent border-none focus:ring-0 text-body-main placeholder:text-outline p-0 resize-none" placeholder="请输入异常详细描述或变更诉求..."></textarea>
<div class="absolute bottom-4 right-4 flex items-center gap-3">
<div class="flex items-center gap-1 px-3 py-1.5 bg-surface-container border border-outline-variant rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[18px]">mic</span>
<span class="text-body-secondary font-medium">语音输入</span>
</div>
</div>
</div>
</section>
<!-- Technical Specification Visual (Bento Grid Mini) -->
<section class="mt-section-margin">
<div class="grid grid-cols-2 gap-3">
<div class="p-3 bg-error-container/30 border border-error/20 rounded-xl">
<p class="text-[11px] text-on-error-container opacity-70 mb-1">风险等级</p>
<p class="text-body-main font-bold text-error">高风险</p>
</div>
<div class="p-3 bg-surface-container border border-outline-variant rounded-xl">
<p class="text-[11px] text-on-surface-variant mb-1">预计损失</p>
<p class="text-body-main font-bold text-on-surface">评估中...</p>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area (Sticky) -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-container-padding py-6 flex flex-col gap-3 shadow-[0_-4px_16px_rgba(0,0,0,0.05)]">
<button class="w-full bg-error text-on-error py-4 rounded-xl font-h3 text-h3 shadow-sm active:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">warning</span>
            确认转异常
        </button>
<p class="text-center text-[12px] text-on-surface-variant">操作后订单将进入“异常挂起”状态，请谨慎操作</p>
</div>
</body></html>
