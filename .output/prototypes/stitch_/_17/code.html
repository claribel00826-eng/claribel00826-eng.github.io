</div>
<div class="flex items-center active:opacity-80 transition-opacity">

</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[64px] px-container-padding pb-section-margin">
<!-- Order Context Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-container-padding mb-stack-gap">
<div class="flex items-center gap-base mb-2">
<div class="w-[3px] h-4 bg-primary"></div>
<span class="font-label-caps text-on-surface-variant">当前待产订单</span>
</div>
<div class="flex justify-between items-start">
<div>
<h2 class="font-h2 text-h2 text-on-surface mb-1">SO-20231024-08</h2>
<p class="font-body-secondary text-on-surface-variant">精密液压泵系列 XH-90</p>
</div>
<div class="bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-full font-label-caps">
                    排产中
                </div>
</div>
<div class="mt-4 pt-4 border-t border-outline-variant grid grid-cols-2 gap-4">
<div>
<p class="font-label-caps text-on-surface-variant">订单总量</p>
<p class="font-number-data text-number-data">100 台</p>
</div>
<div>
<p class="font-label-caps text-on-surface-variant">预计交付</p>
<p class="font-body-main">2023-11-15</p>
</div>
</div>
</div>
<!-- Application Form Section -->
<section class="space-y-stack-gap">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-container-padding">
<div class="flex items-center justify-between mb-2">
<label class="font-h3 text-h3 text-on-surface">插单理由</label>
<button class="flex items-center gap-1 text-[#0369A1] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">mic</span>
<span class="font-label-caps">语音输入</span>
</button>
</div>
<div class="relative">
<textarea class="w-full min-h-[160px] bg-surface-bright border border-outline rounded-lg p-3 text-body-main placeholder:text-outline focus:border-[#0369A1] focus:ring-1 focus:ring-[#0369A1] transition-all" placeholder="请输入详细的插单申请理由，例如：客户急需、停工待料、回款承诺等...">客户产线停工待料，申请插队 5 台，承诺本周内回款。</textarea>
<div class="absolute bottom-3 right-3 text-outline font-label-caps">
                        32/200
                    </div>
</div>
<!-- Guidance Tips -->
<div class="mt-4 flex gap-2 items-start p-3 bg-surface-container rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">info</span>
<p class="font-body-secondary text-on-surface-variant">
                        提示：清晰的理由（如客户停工、回款承诺）将有助于加快生产排程审批流程。
                    </p>
</div>
</div>
<!-- Parameters Selection -->

<div class="space-y-3">
<div class="flex items-center justify-between py-2 border-b border-outline-variant">
<span class="font-body-main text-on-surface-variant">申请插单数量</span>
<div class="flex items-center gap-4">
<button class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center active:bg-surface-container">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="font-number-data text-number-data">5</span>
<button class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center active:bg-surface-container">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-2 border-b border-outline-variant">

<div class="flex items-center gap-1 text-primary">
<span class="font-body-main">2023-11-02</span>
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
</div>
</div>

</div>
