<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=PingFang+SC:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e4e2e4",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed-variant": "#574425",
                    "tertiary": "#000000",
                    "primary-fixed": "#dae2fd",
                    "on-primary-fixed-variant": "#3f465c",
                    "inverse-primary": "#bec6e0",
                    "secondary": "#515f74",
                    "secondary-container": "#d5e3fd",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed-variant": "#3a485c",
                    "surface-container-low": "#f6f3f5",
                    "on-secondary-fixed": "#0d1c2f",
                    "on-tertiary-container": "#98805d",
                    "on-surface-variant": "#45464d",
                    "surface": "#fcf8fa",
                    "surface-tint": "#565e74",
                    "tertiary-fixed-dim": "#dec29a",
                    "on-tertiary-fixed": "#271901",
                    "on-secondary-container": "#57657b",
                    "error-container": "#ffdad6",
                    "on-secondary": "#ffffff",
                    "surface-container": "#f0edef",
                    "surface-bright": "#fcf8fa",
                    "primary-container": "#131b2e",
                    "on-primary-container": "#7c839b",
                    "tertiary-container": "#271901",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#131b2e",
                    "secondary-fixed": "#d5e3fd",
                    "tertiary-fixed": "#fcdeb5",
                    "surface-container-highest": "#e4e2e4",
                    "on-background": "#1b1b1d",
                    "inverse-surface": "#303032",
                    "primary-fixed-dim": "#bec6e0",
                    "primary": "#000000",
                    "outline-variant": "#c6c6cd",
                    "on-surface": "#1b1b1d",
                    "secondary-fixed-dim": "#b9c7e0",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "outline": "#76777d",
                    "surface-container-high": "#eae7e9",
                    "background": "#fcf8fa",
                    "surface-dim": "#dcd9db",
                    "inverse-on-surface": "#f3f0f2",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-margin": "24px",
                    "base": "4px",
                    "inline-gap": "8px",
                    "stack-gap": "12px",
                    "container-padding": "16px"
            },
            "fontFamily": {
                    "h3": ["PingFang SC"],
                    "h1": ["PingFang SC"],
                    "body-main": ["PingFang SC"],
                    "h2": ["PingFang SC"],
                    "body-secondary": ["PingFang SC"],
                    "label-caps": ["PingFang SC"],
                    "number-data": ["Inter"]
            },
            "fontSize": {
                    "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-main": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "number-data": ["18px", {"lineHeight": "24px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fcf8fa;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-main text-on-surface">
<!-- Shared TopAppBar -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline">
<div class="flex items-center gap-2 active:scale-95 transition-transform duration-150 active:opacity-80">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="font-h3 text-h3 text-primary dark:text-inverse-primary">待跟进客户</h1>
<div class="flex items-center active:scale-95 transition-transform duration-150 active:opacity-80">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="pt-[48px] pb-8">
<!-- Segmented Control / Filter Section -->
<section class="px-container-padding py-stack-gap sticky top-[48px] bg-surface z-40">
<div class="flex bg-surface-container-high p-1 rounded-lg">
<button class="flex-1 py-2 text-center text-primary font-h3 text-h3 bg-surface-container-lowest rounded-md shadow-sm">全部</button>
<button class="flex-1 py-2 text-center text-on-surface-variant font-body-secondary text-body-secondary">老客户超时</button>
<button class="flex-1 py-2 text-center text-on-surface-variant font-body-secondary text-body-secondary">公海新客户</button>
</div>
</section>
<!-- Customer List Section -->
<section class="px-container-padding space-y-stack-gap">
<!-- Card 1 -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-container-padding active:scale-[0.98] transition-all duration-150 flex items-center justify-between">
<div class="flex-1 space-y-2">
<div class="flex items-center gap-2">
<div class="w-[3px] h-4 bg-primary rounded-full"></div>
<h2 class="font-h3 text-h3 text-on-surface">华东精密股份有限公司</h2>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-2 py-0.5 bg-secondary-container text-on-secondary-container rounded text-label-caps font-label-caps">老客户超时</span>
<span class="px-2 py-0.5 bg-error-container text-on-error-container rounded text-label-caps font-label-caps">超 7 天未下单</span>
</div>
<p class="text-on-surface-variant text-body-secondary font-body-secondary">最后交易日期：2023.10.24</p>
</div>
<span class="material-symbols-outlined text-outline ml-base" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-container-padding active:scale-[0.98] transition-all duration-150 flex items-center justify-between">
<div class="flex-1 space-y-2">
<div class="flex items-center gap-2">
<div class="w-[3px] h-4 bg-primary rounded-full"></div>
<h2 class="font-h3 text-h3 text-on-surface">某新源动力项目组</h2>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-2 py-0.5 bg-surface-container-highest text-on-surface-variant rounded text-label-caps font-label-caps">公海新客户</span>
<span class="px-2 py-0.5 bg-secondary-container text-on-secondary-container rounded text-label-caps font-label-caps">新分配，未跟进</span>
</div>
<p class="text-on-surface-variant text-body-secondary font-body-secondary">分配时间：今天 09:15</p>
</div>
<span class="material-symbols-outlined text-outline ml-base" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-container-padding active:scale-[0.98] transition-all duration-150 flex items-center justify-between">
<div class="flex-1 space-y-2">
<div class="flex items-center gap-2">
<div class="w-[3px] h-4 bg-primary rounded-full"></div>
<h2 class="font-h3 text-h3 text-on-surface">通达重工装备中心</h2>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-2 py-0.5 bg-secondary-container text-on-secondary-container rounded text-label-caps font-label-caps">老客户超时</span>
<span class="px-2 py-0.5 bg-error-container text-on-error-container rounded text-label-caps font-label-caps">待办任务过期</span>
</div>
<p class="text-on-surface-variant text-body-secondary font-body-secondary">跟进事项：季度方案回访</p>
</div>
<span class="material-symbols-outlined text-outline ml-base" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Card 4 -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-container-padding active:scale-[0.98] transition-all duration-150 flex items-center justify-between">
<div class="flex-1 space-y-2">
<div class="flex items-center gap-2">
<div class="w-[3px] h-4 bg-primary rounded-full"></div>
<h2 class="font-h3 text-h3 text-on-surface">长虹工业自动化</h2>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-2 py-0.5 bg-surface-container-highest text-on-surface-variant rounded text-label-caps font-label-caps">公海新客户</span>
<span class="px-2 py-0.5 bg-secondary-container text-on-secondary-container rounded text-label-caps font-label-caps">新分配，未跟进</span>
</div>
<p class="text-on-surface-variant text-body-secondary font-body-secondary">分配时间：昨天 16:40</p>
</div>
<span class="material-symbols-outlined text-outline ml-base" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Empty state filler or list end indicator -->
<div class="py-8 text-center">
<p class="text-outline text-label-caps font-label-caps uppercase tracking-widest">没有更多待跟进客户</p>
</div>
</section>
</main>
<!-- Floating Action Button (FAB) - Although filtered, common for these views -->
<button class="fixed bottom-10 right-container-padding w-14 h-14 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</body></html>
