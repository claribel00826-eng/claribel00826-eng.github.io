<!DOCTYPE html>

<meta charset="utf-8"/>

                    "on-secondary-container": "#57657b",
                    "on-tertiary-fixed-variant": "#574425",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#3f465c",
                    "surface": "#fcf8fa",
                    "on-tertiary-fixed": "#271901",
                    "surface-variant": "#e4e2e4",
                    "surface-tint": "#565e74",
                    "surface-container-low": "#f6f3f5",
                    "inverse-surface": "#303032",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "surface-container": "#f0edef",
                    "outline": "#76777d",
                    "primary-fixed": "#dae2fd",
                    "on-error-container": "#93000a",
                    "surface-bright": "#fcf8fa",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            width: 24px;
            height: 24px;
        }
        body {
            background-color: #fcf8fa;
            -webkit-font-smoothing: antialiased;
        }
        .industrial-card {
            border: 1px solid #E2E8F0;
            background: #FFFFFF;
            border-radius: 12px;
        }
        .status-pill {
            background-color: rgba(3, 105, 161, 0.1);
            color: #0369A1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-main text-on-surface">
<!-- TopAppBar Shell Mapping -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-base active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
<h1 class="font-h3 text-h3 text-primary ml-2">智能销售助手</h1>
</div>
<div class="flex items-center gap-inline-gap">
<span class="material-symbols-outlined text-on-surface-variant active:scale-95 transition-transform" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="pt-[64px] pb-[100px] px-container-padding">
<!-- Customer Banner -->
<div class="flex items-center justify-between mb-section-margin bg-primary-container p-4 rounded-xl shadow-sm border border-outline-variant">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-primary" data-icon="factory">factory</span>
</div>
<div>
<p class="font-label-caps text-on-primary-container opacity-80 mb-0.5">当前意向客户</p>
<h2 class="font-h2 text-h2 text-white">华东精密</h2>
</div>
</div>
<span class="material-symbols-outlined text-on-primary-container" data-icon="edit">edit</span>
</div>
<!-- Product List Section -->
<div class="flex flex-col gap-stack-gap">
<div class="flex items-center justify-between px-1">
<h3 class="font-h3 text-h3 flex items-center gap-2">
<span class="w-1 h-5 bg-primary rounded-full"></span>
                    选择产品
                </h3>
<span class="font-body-secondary text-secondary">已选 1 件</span>
</div>
<!-- Shopping Cart Item -->
<div class="industrial-card overflow-hidden shadow-[0_4px_12px_rgba(15,23,42,0.04)]">
<div class="p-container-padding flex gap-4">
<div class="relative w-24 h-24 flex-shrink-0 bg-surface-container rounded-lg overflow-hidden border border-outline-variant">
<img alt="CNC Machine" class="w-full h-full object-cover" data-alt="A high-precision CNC machining center in a clean, modern industrial factory setting. The machine is made of heavy grey steel with advanced glass panels and internal LED lighting highlighting the spindle. The photography is professional and clinical, with a cool blue and silver color palette. The overall atmosphere is focused on high-end manufacturing excellence and technological precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBAWGr4bP4uVSWO5o9RtxKQS3G4bi-hZhGykNswRRHN2OFgX1vUrtblCPbIH03M5J2x61FWJtp0vsz7-77g_JhHTYs2wD0QKKHBCKKab2RVN7wPzIOPgVILuvgm6b_gJYuA9LymzoBQ8QTfg2YuqtT2cE4vK-VX5r91Clhg98aAvfCfAU5TwmcB8FNdwGHXoTo37P7GHkbML2cnzPpHtdVpwA7R9F_xHmN599NqiezUhvV9Xo-y6BkBwdTEGGgIX2N9QHLum2apIA"/>
</div>
<div class="flex flex-col justify-between flex-grow">
<div>
<div class="flex justify-between items-start">
<h4 class="font-h3 text-h3 text-on-surface leading-tight">数控加工中心 X200 ×1</h4>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="delete">delete</span>
</div>
<p class="font-body-secondary text-on-surface-variant mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="straighten">straighten</span>
                                行程 800mm
                            </p>
</div>
<div class="flex justify-between items-end mt-2">
<span class="font-number-data text-primary text-[18px]">¥1,020,000</span>
<button class="flex items-center gap-1 text-[#0369A1] font-body-secondary border border-[#0369A1] px-3 py-1 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[16px]" data-icon="settings">settings</span>
                                改配
                            </button>
</div>
</div>
</div>
<!-- Spec Sheet Preview (Industrial style zebra rows) -->
<div class="bg-surface-container-low px-container-padding py-3 border-t border-outline-variant flex flex-col gap-2">
<div class="flex justify-between text-label-caps uppercase text-on-surface-variant">
<span>规格项</span>
<span>明细值</span>
</div>
<div class="flex justify-between font-body-secondary py-1 border-b border-outline-variant/30">
<span class="text-secondary">主轴转速</span>
<span class="font-medium">12000 rpm</span>
</div>
<div class="flex justify-between font-body-secondary py-1">
<span class="text-secondary">刀库容量</span>
<span class="font-medium">24把</span>
</div>
</div>
</div>
<!-- Empty State Placeholder / Recommendation Hint -->
<div class="border-2 border-dashed border-outline-variant rounded-xl p-8 flex flex-col items-center justify-center opacity-40">
<span class="material-symbols-outlined text-[40px] mb-2" data-icon="add_circle">add_circle</span>
<p class="font-body-secondary">添加更多产品进行对比</p>
</div>
</div>
</main>
<!-- Bottom Action Bar (Fixed, No Global Nav per requirements) -->
<footer class="fixed bottom-0 left-0 w-full bg-white px-container-padding pt-4 pb-8 border-t border-outline-variant shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-50">
<div class="flex items-center justify-between mb-4 px-1">
<span class="font-body-main text-on-surface-variant">合计约</span>
<span class="font-h1 text-h1 text-primary">¥1,020,000</span>
</div>
<div class="flex gap-3">
<button class="flex-1 py-4 border border-[#0369A1] text-[#0369A1] font-h3 text-h3 rounded-lg active:opacity-80 transition-opacity">
                继续推荐
            </button>
<button class="flex-[1.5] py-4 bg-primary text-white font-h3 text-h3 rounded-lg shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
                去生成方案
                <span class="material-symbols-outlined" data-icon="description">description</span>
</button>
</div>
</footer>
</body></html>
