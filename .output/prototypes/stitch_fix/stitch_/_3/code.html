<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e4e2e4",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#574425",

                        "on-secondary-fixed-variant": "#3a485c",

                        "on-tertiary-container": "#98805d",
                        "on-surface-variant": "#45464d",
                        "surface": "#fcf8fa",
                        "surface-tint": "#565e74",
                        "tertiary-fixed-dim": "#dec29a",
                        "on-tertiary-fixed": "#271901",
                        "on-secondary-container": "#57657b",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "surface-container": "#f0edef",
                        "surface-bright": "#fcf8fa",
                        "primary-container": "#131b2e",
                        "on-primary-container": "#7c839b",
                        "tertiary-container": "#271901",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#131b2e",
                        "secondary-fixed": "#d5e3fd",
                        "tertiary-fixed": "#fcdeb5",
                        "surface-container-highest": "#e4e2e4",
                        "on-background": "#1b1b1d",
                        "inverse-surface": "#303032",
                        "primary-fixed-dim": "#bec6e0",
                        "primary": "#000000",
                        "outline-variant": "#c6c6cd",
                        "on-surface": "#1b1b1d",
                        "secondary-fixed-dim": "#b9c7e0",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "outline": "#76777d",
                        "surface-container-high": "#eae7e9",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "section-margin": "24px",
                        "base": "4px",
                        "inline-gap": "8px",
                        "stack-gap": "12px",
                        "container-padding": "16px"
                    },
                    "fontFamily": {
                        "h3": ["PingFang SC", "Noto Sans SC"],
                        "h1": ["PingFang SC", "Noto Sans SC"],
                        "body-main": ["PingFang SC", "Noto Sans SC"],
                        "h2": ["PingFang SC", "Noto Sans SC"],
                        "body-secondary": ["PingFang SC", "Noto Sans SC"],
                        "label-caps": ["PingFang SC", "Noto Sans SC"],
                        "number-data": ["Inter"]

                    "fontSize": {
                        "h3": ["17px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "h1": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],

                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-secondary": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],

                },
            },
        }

<style>
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 8px; }
        .active-tap { transition: transform 150ms ease, opacity 150ms ease; }
        .active-tap:active { transform: scale(0.95); opacity: 0.8; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface">
<!-- TopAppBar Section -->
<header class="fixed top-0 left-0 w-full h-[48px] flex items-center justify-between px-container-padding z-50 bg-surface border-b border-outline-variant">
<div class="flex items-center gap-2">
<span class="font-h3 text-h3 text-primary">上午好，张伟</span>
</div>
<div class="flex items-center gap-3">
<img class="w-8 h-8 rounded-full bg-surface-container shadow-sm border border-outline-variant" data-alt="A professional business headshot of a male sales executive in a minimalist flat vector style. The avatar features clean lines, a friendly expression, and a neutral corporate color palette of soft greys and navy. The background is a clean, solid light grey, fitting a modern B2B application interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHjmYvedh-SIm1t2fzrjCnvIL7Fs7VLFY2iALn-reUQXPGxpq4__xruB_9k0PIwbaUAc8lqUaxuQkht5C_zxPzCA-ph820bAUj0Nritu5ux4PczGeElzB1xiWj30GFdzEV7-x-OGyOO1-p9rAgk4j0FsjJC-E7zXdhzervIez1fUTMbDz4cxH3pRSNMuYuqHBSj4Xebf5ok8PQdMpowcIcO-r0lotkV6kHsBD8j4IGOnEeMC1KvA9X72XMpCDuNBj80zFU5g4IDg"/>
<span class="material-symbols-outlined text-on-surface-variant active-tap" style="font-size: 24px;">more_vert</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-[48px] pb-5 px-container-padding flex flex-col gap-4">
<!-- Follow-up Entry (40px high) -->
<section class="mt-4 flex items-center justify-between bg-surface-container-lowest border border-outline-variant rounded-lg h-[40px] px-3 active-tap">
<div class="flex items-center gap-2 overflow-hidden">
<span class="font-h3 text-[15px] whitespace-nowrap text-primary">待跟进客户 5</span>
<span class="w-[1px] h-3 bg-outline-variant"></span>
<span class="font-body-secondary text-[12px] text-on-surface-variant truncate">老客户超时 3 · 公海新客户 2</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 18px;">chevron_right</span>
</section>
<!-- Function Grid (4 Columns, 11 Items) -->
<section class="grid-container py-2">
<!-- 客户开拓 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">person_add</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">客户开拓</span>
</div>
<!-- 产品推荐 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">recommend</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">产品推荐</span>
</div>
<!-- 购物车 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">shopping_cart</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">购物车</span>
</div>
<!-- 生成方案 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">lightbulb</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">生成方案</span>
</div>
<!-- 生成报价 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">request_quote</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">生成报价</span>
</div>
<!-- 交期评审 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">event_repeat</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">交期评审</span>
</div>
<!-- 生成订单 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">add_task</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">生成订单</span>
</div>
<!-- 订单复制 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">content_copy</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">订单复制</span>
</div>
<!-- 订单变更 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">edit_document</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">订单变更</span>
</div>
<!-- 订单进度 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">pending_actions</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">订单进度</span>
</div>
<!-- 客户服务 -->
<div class="flex flex-col items-center gap-2 active-tap">
<div class="w-12 h-12 rounded-xl bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-size: 24px;">support_agent</span>
</div>
<span class="text-[13px] font-medium text-on-surface text-center">客户服务</span>
</div>
</section>
<!-- Recent Customers Chip -->
<section class="mt-2 flex items-center gap-2 overflow-hidden py-1">
<span class="text-[13px] text-on-surface-variant font-medium whitespace-nowrap">最近：</span>
<div class="flex gap-2 overflow-x-auto no-scrollbar">
<div class="flex items-center gap-1 bg-surface-container-high px-3 py-1.5 rounded-full border border-outline-variant active-tap">
<span class="text-[12px] text-on-surface font-medium whitespace-nowrap">华东精密</span>
</div>
<div class="flex items-center gap-1 bg-surface-container-high px-3 py-1.5 rounded-full border border-outline-variant active-tap">
<span class="text-[12px] text-on-surface font-medium whitespace-nowrap">公海新客户</span>
</div>
</div>
</section>
</main>
<!-- Bottom Content Placeholder (For scroll depth illustration) -->
</body></html>
