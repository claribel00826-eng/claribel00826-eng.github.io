<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>销售助手 · 原型版本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fafafa;
      --surface: #fff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .portal {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    .portal__brand {
      font-family: Outfit, "PingFang SC", sans-serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 6px;
    }
    .portal__desc {
      margin: 0 0 32px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
    }
    .portal__label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .version-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .version-card {
      display: block;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .version-card:hover {
      border-color: #c7d2fe;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.08);
    }
    .version-card:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .version-card__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .version-card__id {
      font-family: Outfit, monospace;
      font-size: 15px;
      font-weight: 600;
      color: var(--primary);
    }
    .version-card__tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      background: #eef2ff;
      color: #4338ca;
      white-space: nowrap;
    }
    .version-card__meta {
      margin: 8px 0 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--muted);
    }
    .version-card__arrow {
      font-size: 18px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .portal__foot {
      margin-top: 40px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="portal">
    <h1 class="portal__brand">销售助手 H5 原型</h1>
    <p class="portal__desc">选择版本进入可交互演示页（含设计标注）。每个版本为独立静态站点目录。</p>
    <p class="portal__label">版本列表</p>
    <ul class="version-list">
      <li>
        <a class="version-card" href="v1.0.0/index.html">
          <div class="version-card__row">
            <span class="version-card__id">v1.0.0</span>
            <span class="version-card__tag">当前</span>
            <span class="version-card__arrow" aria-hidden="true">→</span>
          </div>
          <p class="version-card__meta">制造业外勤销售助手 · 对话首页、待跟进、写跟进与意图填槽演示</p>
        </a>
      </li>
    </ul>
    <p class="portal__foot">演示账号见各版本页说明 · 本地路径 <code>.output/index.html</code></p>
  </main>
</body>
</html>
