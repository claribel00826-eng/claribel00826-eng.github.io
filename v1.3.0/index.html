<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>销售助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css?v=20260530c" />
  <link rel="stylesheet" href="css/annotation.css" />
</head>
<body>
  <div class="sc-demo-shell sc-demo--tpl" id="demo-shell">
    <div class="sc-demo-toolbar" aria-label="演示控制（非 H5 内）">
      <a
        class="sc-demo-reset-btn sc-demo-reset-btn--link"
        href="../index.html"
        title="返回版本索引页"
      >回到索引页</a>
      <button
        type="button"
        id="btn-demo-reset"
        class="sc-demo-reset-btn"
        title="清除本地会话并恢复为首屏欢迎态"
      >
        初始化页面
      </button>
      <button
        type="button"
        id="btn-spec-toggle"
        class="sc-demo-reset-btn sc-demo-spec-btn"
        title="开启后显示右侧标注面板与各模块「标注」按钮（Alt+D 快捷键）"
        aria-pressed="false"
      >
        设计标注
      </button>
      <a class="sc-demo-toolbar__link" href="annotation-docs/index.html" target="_blank" rel="noopener">标注文档</a>
      <a
        class="sc-demo-toolbar__link"
        href="意图识别说明.html"
        target="_blank"
        rel="noopener"
      >意图识别说明</a>
      <span class="sc-demo-toolbar__hint">演示用 · 左侧为微信模板消息，右侧为 H5 销售助手</span>
    </div>
    <div class="sc-demo-body" id="demo-body">
    <aside id="wx-service-panel" class="sc-wx-service" aria-label="微信服务号消息（演示，非 H5 内）">
      <div class="sc-wx-service__status">
        <span class="sc-wx-service__time">9:41</span>
      </div>
      <header class="sc-wx-service__nav">
        <span class="sc-wx-service__back" aria-hidden="true">‹</span>
        <span class="sc-wx-service__name">销售助手服务号</span>
      </header>
      <div class="sc-wx-service__chat">
        <div class="sc-wx-service__row">
          <div class="sc-wx-service__avatar" aria-hidden="true">销</div>
          <div class="sc-wx-service__bubble" id="wx-template-mount">
          </div>
        </div>
        <p class="sc-wx-service__hint">微信内模板消息；点击按钮进入右侧 H5 并拉取待跟进列表</p>
      </div>
    </aside>
    <div class="sc-app">
    <div id="view-chat" class="sc-chat">
      <header class="sc-header sc-header--with-status">
        <div class="sc-header__top">
          <span class="sc-header__title" id="header-title" data-spec-id="chat-header">销售助手 · Pro</span>
          <button
            type="button"
            class="sc-header__clear"
            id="clear-customer-chat"
            data-spec-id="btn-clear-customer-chat"
            aria-label="清空全部对话记录"
          >
            清空记录
          </button>
        </div>
        <div class="sc-header__status" data-spec-id="chat-context-bar">
          <div class="sc-status-item" data-spec-id="chat-current-skill">
            <span class="sc-status-label">当前功能</span>
            <span class="sc-status-value" id="header-skill">—</span>
          </div>
          <div class="sc-status-item sc-status-item--customer" data-spec-id="chat-current-customer">
            <div class="sc-status-item__top">
              <span class="sc-status-label">当前客户</span>
              <button
                type="button"
                class="sc-status-switch"
                id="btn-switch-customer"
                data-spec-id="btn-switch-customer"
                aria-label="切换客户"
              >
                切换
              </button>
            </div>
            <div class="sc-status-customer-body">
              <span class="sc-status-value sc-status-value--empty" id="header-customer-display">未选择</span>
              <span class="sc-status-tags" id="header-customer-tags" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </header>
      <section
        class="sc-chat-dialog"
        data-spec-id="chat-messages"
        aria-label="对话消息区"
      >
      <main class="sc-messages" id="messages"></main>
      </section>
      <footer class="sc-dock">
        <div class="sc-dock-skills sc-dock-skills--full" data-spec-id="chat-skill-bar">
          <div class="sc-skills-scroll" id="skill-scroll">
            <div class="sc-skills-track" id="skill-bar">
            </div>
          </div>
        </div>
        <div class="sc-composer" id="composer" data-spec-id="chat-input-bar">
          <button type="button" class="sc-mode-toggle" id="mode-toggle">键盘</button>
          <button type="button" class="sc-voice" id="voice-btn">按住 说话</button>
          <input type="text" class="sc-text-input" id="text-input" placeholder="输入消息…" />
          <button type="button" class="sc-send" id="send-btn" aria-label="发送">➤</button>
        </div>
      </footer>
    </div>

  <div id="sc-portal" class="sc-portal" aria-hidden="false">
  <!-- 业务表单已改为消息卡片（js/app.js · js/skills.js） -->

  <!-- PDF 预览 -->
  <div id="skill-switch-modal" class="sc-overlay sc-overlay--dialog sc-hidden" data-spec-id="modal-skill-switch" role="dialog" aria-modal="true" aria-labelledby="skill-switch-title">
    <div class="sc-dialog">
      <div class="sc-dialog__head" id="skill-switch-title">切换功能</div>
      <p class="sc-dialog__prompt" id="skill-switch-prompt">是否保留当前客户？</p>
      <div class="sc-dialog__actions">
        <button type="button" class="sc-btn sc-btn--primary" id="skill-switch-keep">保留客户</button>
        <button type="button" class="sc-btn sc-btn--ghost" id="skill-switch-discard">重新选客户</button>
      </div>
    </div>
  </div>
  <div id="pdf-modal" class="sc-pdf sc-hidden" data-spec-id="modal-pdf">
    <div class="sc-pdf__bar">
      <button type="button" class="sc-btn sc-btn--ghost" id="pdf-close">返回</button>
      <span class="sc-pdf__bar-title" id="pdf-bar-title">文档预览</span>
      <div class="sc-pdf__bar-actions">
        <button type="button" class="sc-btn sc-btn--ghost sc-btn--sm" id="pdf-download" disabled>下载</button>
        <button type="button" class="sc-btn sc-btn--ghost-primary sc-btn--sm" id="pdf-forward" disabled>转发</button>
      </div>
    </div>
    <div class="sc-pdf__body" id="pdf-body"></div>
  </div>
  </div><!-- /sc-portal -->

    </div>
    </div>
  </div>

  <div id="toast" class="sc-toast"></div>

  <aside class="sc-spec-panel" id="spec-panel">
    <div class="sc-spec-panel__head">
      <span class="sc-spec-panel__head-title">设计标注</span>
      <button type="button" id="spec-close" class="sc-spec-close sc-hidden" aria-label="关闭标注">关闭标注</button>
    </div>
    <div class="sc-spec-panel__body" id="spec-panel-body">
      <p>验收模式：点击各模块右上角「标注」查看查询与交互说明。</p>
    </div>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script src="js/demo-data.js?v=20260530a"></script>
  <script src="js/pdf-export.js?v=20260526c"></script>
  <script src="js/annotation-spec-data.js?v=20260531a"></script>
  <script src="js/annotation-spec-scope.js?v=20260530b"></script>
  <script src="js/skills.js?v=20260530m"></script>
  <script src="js/annotation.js?v=20260528"></script>
  <script src="js/app.js?v=20260530d"></script>
</body>
</html>
